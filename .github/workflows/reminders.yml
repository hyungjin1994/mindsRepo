name: Reminders dispatch

# Calls the canonical reminder/notification dispatcher every 15 minutes.
# Required repo secret (Settings -> Secrets and variables -> Actions):
#   CRON_SECRET  same value as the app's CRON_SECRET env var (authorizes the call)
# APP_URL is hard-coded below to the production domain so only one secret is needed.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

env:
  APP_URL: https://minds-repo.vercel.app

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/reminders
        run: |
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${APP_URL}/api/cron/reminders"
